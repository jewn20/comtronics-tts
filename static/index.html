<!DOCTYPE html>
<html>
<head>
  <title>COMTRONICS TTS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Segoe UI;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* HERO */
    .hero h1 {
      font-size: 40px;
      color: #38bdf8;
      margin: 0;
    }

    .hero h2 {
      color: #cbd5f5;
      margin: 5px 0;
    }

    .hero p {
      color: #94a3b8;
      max-width: 600px;
      line-height: 1.6;
    }

    .hero button {
      margin-top: 10px;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }

    /* DASHBOARD */
    .dashboard {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .progress {
      height: 10px;
      background: #334155;
      border-radius: 10px;
      margin-top: 10px;
    }

    #progressBar {
      height: 10px;
      background: #38bdf8;
      border-radius: 10px;
      width: 0%;
    }

    /* APP */
    .layout {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 8px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
    }

    button.generate {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      color: black;
      cursor: pointer;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    /* PRICING */
    .pricing {
      margin-top: 60px;
      text-align: center;
    }

    .plan {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      display: inline-block;
      margin: 10px;
    }

    @media(max-width:768px){
      .layout {
        flex-direction: column;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>COMTRONICS TTS</h1>
    <h2>Human Intelligence. Artificial Voice.</h2>
    <p>
      COMTRONICS TTS is a high-performance Neural Text-to-Speech platform designed 
      to bridge the gap between digital content and human connection.
    </p>

    <button onclick="loginWithGoogle()">Sign in with Google</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <strong id="plan">FREE PLAN</strong><br>
    <span id="usageText">0 / 3 used</span>

    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <button onclick="upgrade()">Upgrade</button>
  </div>

  <!-- APP -->
  <div class="layout">

    <div class="card" style="flex:2">
      <textarea id="text">Minsan...

hindi ka naman talaga kulang...</textarea>
    </div>

    <div class="card" style="flex:1">

      <input id="search" placeholder="Search voice..." onkeyup="filterVoices()">
      <select id="voice"></select>

      <input type="range" id="rate" min="-50" max="50" value="10">
      <input type="range" id="pitch" min="-10" max="10" value="0">

      <button class="generate" onclick="generate()">🚀 Generate</button>

      <audio id="audio" controls></audio>

    </div>

  </div>

  <!-- PRICING -->
  <div class="pricing">
    <h2>Pricing</h2>

    <div class="plan">
      <h3>Free</h3>
      <p>3 generations per day</p>
    </div>

    <div class="plan">
      <h3>Pro</h3>
      <p>Unlimited generation</p>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "comtronics-tts.firebaseapp.com",
  projectId: "comtronics-tts"
};

firebase.initializeApp(firebaseConfig);

let currentUser = null;

/* LOGIN */
function loginWithGoogle(){
  let provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then(res => {
      currentUser = res.user;
      alert("Logged in: " + currentUser.email);
      loadUsage();
    });
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    loadUsage();
  }
});

/* VOICES */
let allVoices = [];

async function loadVoices(){
  let res = await fetch("https://comtronics-tts.onrender.com/voices");
  let data = await res.json();

  allVoices = data.voices;
  renderVoices(allVoices);
}

function renderVoices(list){
  let s = document.getElementById("voice");
  s.innerHTML = "";

  list.forEach(v=>{
    let o = document.createElement("option");
    o.value = v.name;
    o.textContent = `${v.name} (${v.lang})`;
    s.appendChild(o);
  });
}

function filterVoices(){
  let k = document.getElementById("search").value.toLowerCase();
  renderVoices(allVoices.filter(v=>v.name.toLowerCase().includes(k)));
}

/* USAGE */
async function loadUsage(){
  let user_id = currentUser ? currentUser.uid : "guest";

  let res = await fetch(`https://comtronics-tts.onrender.com/usage?user_id=${user_id}`);
  let data = await res.json();

  document.getElementById("plan").innerText = data.plan.toUpperCase() + " PLAN";
  document.getElementById("usageText").innerText = `${data.usage} / ${data.limit} used`;

  let percent = (data.usage / data.limit) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* GENERATE */
async function generate(){
  let text = document.getElementById("text").value;
  let voice = document.getElementById("voice").value;
  let user_id = currentUser ? currentUser.uid : "guest";

  let url = `https://comtronics-tts.onrender.com/tts?text=${encodeURIComponent(text)}&voice=${voice}&rate=${rate.value}&pitch=${pitch.value}&user_id=${user_id}`;

  let res = await fetch(url);

  if(res.headers.get("content-type")?.includes("application/json")){
    let data = await res.json();
    alert(data.error);
    return;
  }

  document.getElementById("audio").src = url;

  loadUsage();
}

function upgrade(){
  alert("Upgrade system coming soon 💳");
}

window.onload = loadVoices;
</script>

</body>
</html>
